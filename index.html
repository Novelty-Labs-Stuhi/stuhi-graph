<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Who-knows-whom · network</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #cdd3df;
    background:
      radial-gradient(1200px 900px at 62% 40%, #161b26 0%, #0c0f16 55%, #080a0f 100%);
  }
  svg { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  .link { stroke: #6d86c8; stroke-opacity: .12; }
  .link.mutual { stroke: #9fbcff; stroke-opacity: .22; }
  .link.hl { stroke-opacity: .85; }
  .link.mute { stroke-opacity: .03; }

  .node { cursor: grab; }
  .node:active { cursor: grabbing; }
  .node.mute { opacity: .1; }
  .label {
    fill: #e9edf5; font-weight: 600; text-anchor: middle;
    paint-order: stroke; stroke: #05070b; stroke-width: 3px; stroke-linejoin: round;
    pointer-events: none;
  }
  .label.mute { opacity: .12; }
  .label.hidden { display: none; }

  #panel {
    position: fixed; top: 12px; left: 12px; width: 166px;
    background: rgba(14,18,26,.8); backdrop-filter: blur(10px);
    border: 1px solid #212838; border-radius: 10px; padding: 10px 11px;
    box-shadow: 0 8px 26px rgba(0,0,0,.5); font-size: 11px;
  }
  #panel h1 { font-size: 12px; margin: 0 0 1px; }
  #panel .sub { color: #78839a; font-size: 9.5px; margin-bottom: 8px; }
  .ctl { margin: 6px 0; }
  .ctl label { display: flex; justify-content: space-between; color: #93a0b6; margin-bottom: 2px; font-size: 10px; }
  .ctl label b { color: #d3dae7; font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; height: 3px; accent-color: #6c8cff; }
  .row { display: flex; gap: 6px; margin-top: 9px; }
  button {
    flex: 1; background: #171f2e; color: #d3dae7; border: 1px solid rgba(41,51,70,.6);
    border-radius: 7px; padding: 5px 6px; cursor: pointer; font-size: 10.5px;
  }
  button:hover { background: #1f293b; }
  .legend { margin-top: 9px; border-top: 1px solid #212838; padding-top: 8px; color: #7f8aa0; font-size: 9.5px; line-height: 1.35; }
  #tip {
    position: fixed; pointer-events: none; z-index: 10; padding: 6px 9px;
    background: #06080d; border: 1px solid #2b3446; border-radius: 8px; font-size: 12px;
    opacity: 0; transition: opacity .08s; max-width: 240px;
  }
  #tip b { color: #fff; } #tip .d { color: #8fb0ff; font-variant-numeric: tabular-nums; }
  #hint { position: fixed; bottom: 12px; right: 14px; color: #4c566e; font-size: 11px; }
</style>
</head>
<body>
<svg id="svg">
  <defs>
    <radialGradient id="nodeGrad" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#cddcff"/>
      <stop offset="42%" stop-color="#6d93ff"/>
      <stop offset="100%" stop-color="#3358d8"/>
    </radialGradient>
    <radialGradient id="redGrad" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffd6cf"/>
      <stop offset="42%" stop-color="#ff6a5a"/>
      <stop offset="100%" stop-color="#c81f2e"/>
    </radialGradient>
  </defs>
</svg>

<div id="panel">
  <h1>Who-knows-whom</h1>
  <div class="sub" id="meta">…</div>
  <div class="ctl"><label>Charge <b id="vCharge">— </b></label>
    <input id="charge" type="range" autocomplete="off" min="80" max="3200" step="20" value="1800"></div>
  <div class="ctl"><label>Link distance <b id="vDist">—</b></label>
    <input id="dist" type="range" autocomplete="off" min="20" max="320" step="2" value="170"></div>
  <div class="ctl"><label>Link strength <b id="vStr">—</b></label>
    <input id="str" type="range" autocomplete="off" min="0" max="1" step="0.02" value="0.14"></div>
  <div class="row">
    <button id="reheat">Re-settle</button>
    <button id="labels">Labels: hubs</button>
  </div>
  <div class="legend">Node size = number of connections. Hover to isolate a circle of friends; drag to rearrange.</div>
</div>

<div id="tip"></div>
<div id="hint">drag nodes · scroll to zoom · drag background to pan</div>

<script src="graph-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(() => {
  const G = window.GRAPH;
  const maxDeg = Math.max(...G.nodes.map(n => n.degree), 1);
  const minDeg = Math.min(...G.nodes.map(n => n.degree));
  // pronounced size scaling: near-linear in degree, wide radius range
  const rOf = d => 3.5 + 33 * Math.pow((d - minDeg) / (maxDeg - minDeg || 1), 0.85);

  const nodes = G.nodes.map(n => ({ ...n }));
  const links = G.edges.map(e => ({ ...e }));
  const adj = new Map(nodes.map(n => [n.id, new Set()]));
  links.forEach(l => { adj.get(l.source).add(l.target); adj.get(l.target).add(l.source); });

  const svg = d3.select('#svg');
  const W = () => window.innerWidth, H = () => window.innerHeight;
  const root = svg.append('g');
  const gLink = root.append('g');
  const gNode = root.append('g');
  const gLabel = root.append('g');

  document.getElementById('meta').textContent =
    `${G.meta.node_count} people · ${G.meta.edge_count} links · ${G.meta.mutual_edges} mutual`;

  // ---- forces ------------------------------------------------------------
  const P = { charge: 1800, dist: 170, str: 0.14 };
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(P.dist).strength(P.str))
    .force('charge', d3.forceManyBody().strength(-P.charge))
    .force('center', d3.forceCenter(W() / 2, H() / 2))
    .force('collide', d3.forceCollide(d => rOf(d.degree) + 6).strength(0.9))
    .force('x', d3.forceX(W() / 2).strength(0.08))
    .force('y', d3.forceY(H() / 2).strength(0.08))
    .alphaDecay(0.028)      // cools to rest, then stops
    .on('tick', ticked);

  // ---- draw --------------------------------------------------------------
  const link = gLink.selectAll('line').data(links).join('line')
    .attr('class', d => 'link' + (d.mutual ? ' mutual' : ''))
    .attr('stroke-width', d => d.mutual ? 1.4 : 0.8);

  const node = gNode.selectAll('g').data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag().on('start', dstart).on('drag', dragged).on('end', dend))
    .on('mouseenter', (e, d) => setHover(d))
    .on('mouseleave', () => setHover(null));

  const isRed = d => d.id === 'Caeden';
  node.append('circle')
    .attr('r', d => rOf(d.degree))
    .attr('fill', d => isRed(d) ? 'url(#redGrad)' : 'url(#nodeGrad)')
    .attr('stroke', d => isRed(d) ? 'rgba(255,200,192,0.8)' : 'rgba(190,212,255,0.75)')
    .attr('stroke-width', 1)
    .style('filter', d => `drop-shadow(0 0 ${4 + rOf(d.degree) * 0.5}px ${isRed(d) ? 'rgba(255,70,60,.5)' : 'rgba(78,124,255,.45)'})`);

  const label = gLabel.selectAll('text').data(nodes).join('text')
    .attr('class', 'label')
    .attr('font-size', d => 8.5 + 8 * Math.pow(d.degree / maxDeg, 0.9))
    .attr('dy', d => rOf(d.degree) + 11)
    .text(d => d.id);

  function ticked() {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
    label.attr('x', d => d.x).attr('y', d => d.y);
  }

  // ---- hover isolation ---------------------------------------------------
  let hover = null;
  const tip = document.getElementById('tip');
  function setHover(d) {
    hover = d;
    const near = d ? adj.get(d.id) : null;
    const on = id => !d || id === d.id || near.has(id);
    node.classed('mute', n => !on(n.id));
    label.classed('mute', n => !on(n.id));
    link.classed('hl', l => d && (l.source.id === d.id || l.target.id === d.id))
        .classed('mute', l => d && !(l.source.id === d.id || l.target.id === d.id));
    applyLabelMode();
    if (d) {
      tip.style.opacity = 1;
      tip.innerHTML = `<b>${d.id}</b><br><span class="d">${d.degree}</span> connections` +
        (d.responded ? '' : '<br><span style="color:#78839a">— named by others, no form</span>');
    } else tip.style.opacity = 0;
  }
  window.addEventListener('mousemove', e => {
    if (hover) { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY + 12) + 'px'; }
  });

  // ---- labels mode -------------------------------------------------------
  let labelMode = 1; // 0 none, 1 hubs, 2 all
  const HUB = maxDeg * 0.45;
  const labelBtn = document.getElementById('labels');
  function applyLabelMode() {
    label.classed('hidden', d => {
      if (hover) return !(d.id === hover.id || adj.get(hover.id).has(d.id));
      if (labelMode === 0) return true;
      if (labelMode === 1) return d.degree < HUB;
      return false;
    });
  }
  labelBtn.onclick = () => {
    labelMode = (labelMode + 1) % 3;
    labelBtn.textContent = 'Labels: ' + ['off', 'hubs', 'all'][labelMode];
    applyLabelMode();
  };
  applyLabelMode();

  // ---- drag --------------------------------------------------------------
  function dstart(e, d) { if (!e.active) sim.alphaTarget(0.15).restart(); d.fx = d.x; d.fy = d.y; }
  function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
  function dend(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }

  // ---- controls ----------------------------------------------------------
  const fmt = (id, v) => document.getElementById(id).textContent = v;
  // force sliders to code defaults (browsers otherwise restore stale values on reload)
  document.getElementById('charge').value = P.charge;
  document.getElementById('dist').value = P.dist;
  document.getElementById('str').value = P.str;
  fmt('vCharge', P.charge); fmt('vDist', P.dist); fmt('vStr', P.str.toFixed(2));
  const reheat = (a = 0.6) => sim.alpha(a).restart();
  document.getElementById('charge').oninput = e => { P.charge = +e.target.value; fmt('vCharge', P.charge); sim.force('charge').strength(-P.charge); reheat(0.4); };
  document.getElementById('dist').oninput = e => { P.dist = +e.target.value; fmt('vDist', P.dist); sim.force('link').distance(P.dist); reheat(0.4); };
  document.getElementById('str').oninput = e => { P.str = +e.target.value; fmt('vStr', P.str.toFixed(2)); sim.force('link').strength(P.str); reheat(0.4); };
  document.getElementById('reheat').onclick = () => reheat(0.7);

  // ---- zoom / pan --------------------------------------------------------
  const zoom = d3.zoom().scaleExtent([0.2, 6]).on('zoom', e => root.attr('transform', e.transform));
  svg.call(zoom).on('dblclick.zoom', null);

  // frame the whole graph once it settles
  function fitToView(pad = 70, dur = 600) {
    if (!nodes.length) return;
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    for (const n of nodes) {
      const r = rOf(n.degree);
      x0 = Math.min(x0, n.x - r); y0 = Math.min(y0, n.y - r);
      x1 = Math.max(x1, n.x + r); y1 = Math.max(y1, n.y + r);
    }
    const w = x1 - x0, h = y1 - y0;
    const k = Math.min(3, 0.95 * Math.min((W() - 2 * pad) / w, (H() - 2 * pad) / h));
    const tx = W() / 2 - k * (x0 + w / 2), ty = H() / 2 - k * (y0 + h / 2);
    svg.transition().duration(dur)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
  }
  sim.on('end', () => fitToView());
  document.getElementById('reheat').addEventListener('click', () => setTimeout(fitToView, 4500));

  // recenter forces on resize
  window.addEventListener('resize', () => {
    sim.force('center', d3.forceCenter(W() / 2, H() / 2));
    sim.force('x', d3.forceX(W() / 2).strength(0.08));
    sim.force('y', d3.forceY(H() / 2).strength(0.08));
    reheat(0.2);
  });
})();
</script>
</body>
</html>
